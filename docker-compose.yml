services:
  postgres:
    image: postgres:15-alpine
    container_name: vero_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vero
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vero"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # The same image Railway builds and runs. Use this to verify the
  # container locally before pushing — `docker compose up api --build`.
  api:
    build:
      context: ./backend
    container_name: vero_api
    environment:
      # postgres@5432 = the service name above on the compose network,
      # NOT localhost — inside the container localhost is the container.
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/vero"
      JWT_SECRET: "local-dev-only-not-a-real-secret"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
